<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <h1>Calculadora</h1>
    <div id="calculator">
        <!-- POST envia os dados para o Flask; a função calcular() no calculadora.py faz a conta -->
        <form method="POST" action="{{ url_for('index') }}">

            <div class="form-grupo">
                <label for="num1">Primeiro número <span id="label-a">(a)</span></label>
                <input type="number" id="num1" name="num1" step="any" required
                       value="{{ request.form.get('num1', '') }}">
            </div>

            <div class="form-grupo">
                <label for="operacao">Operação</label>
                {% set op = request.form.get('operacao', '+') %}
                <select id="operacao" name="operacao" required onchange="atualizarCampos()">
                    <option value="+" {% if op == '+' %}selected{% endif %}>+ Somar</option>
                    <option value="-" {% if op == '-' %}selected{% endif %}>− Subtrair</option>
                    <option value="*" {% if op == '*' %}selected{% endif %}>× Multiplicar</option>
                    <option value="/" {% if op == '/' %}selected{% endif %}>÷ Dividir</option>
                    <option value="**" {% if op == '**' %}selected{% endif %}>^ Potência</option>
                    <option value="sqrt" {% if op == 'sqrt' %}selected{% endif %}>√ Raiz quadrada</option>
                    <option value="log" {% if op == 'log' %}selected{% endif %}>log Logaritmo (base 10)</option>
                    <option value="bhaskara" {% if op == 'bhaskara' %}selected{% endif %}>Bhaskara (ax² + bx + c)</option>
                </select>
            </div>

            <div class="form-grupo" id="grupo-num2">
                <label for="num2">Segundo número <span id="label-b">(b)</span></label>
                <input type="number" id="num2" name="num2" step="any"
                       value="{{ request.form.get('num2', '') }}">
            </div>

            <div class="form-grupo" id="grupo-num3">
                <label for="num3">Terceiro número (c)</label>
                <input type="number" id="num3" name="num3" step="any"
                       value="{{ request.form.get('num3', '') }}">
            </div>

            <button type="submit">Calcular</button>
        </form>

        {% if etapas %}
        <div class="resultado">
            <strong>Resposta do servidor (Python):</strong>
            <div>{{ etapas }}</div>
            <div>Resultado: {{ resultados }}</div>
        </div>
        {% endif %}

        <a href="{{ url_for('index') }}">Limpar / nova conta</a>
    </div>

    <script>
        function atualizarCampos() {
            const operacao = document.getElementById("operacao").value;
            const grupoNum2 = document.getElementById("grupo-num2");
            const grupoNum3 = document.getElementById("grupo-num3");
            const num2 = document.getElementById("num2");
            const num3 = document.getElementById("num3");
            const labelA = document.getElementById("label-a");
            const labelB = document.getElementById("label-b");

            const precisaNum2 = operacao !== "sqrt" && operacao !== "log";
            const precisaNum3 = operacao === "bhaskara";

            grupoNum2.style.display = precisaNum2 ? "block" : "none";
            num2.required = precisaNum2;
            if (!precisaNum2) num2.value = "";

            grupoNum3.style.display = precisaNum3 ? "block" : "none";
            num3.required = precisaNum3;
            if (!precisaNum3) num3.value = "";

            // Troca os rótulos pra "a, b, c" quando for Bhaskara
            labelA.textContent = precisaNum3 ? "(a)" : "";
            labelB.textContent = precisaNum3 ? "(b)" : "";
        }

        atualizarCampos();
    </script>
</body>
</html>
